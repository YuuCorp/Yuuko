query GetUserList($type: MediaType, $userId: Int) {
    MediaListCollection(type: $type, userId: $userId) {
        lists {
            entries {
                media {
                    id
                }
                status
                progress
                score
                notes
            }
        }
        user {
            name
            mediaListOptions {
                scoreFormat
            }
            id
        }
    }
}
